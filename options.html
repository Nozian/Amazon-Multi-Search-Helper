<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Amazon Multi-Search Helper 設定 / Settings</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.6; }
        h1 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .section { margin: 20px 0; padding: 15px; background-color: #f8f9fa; border-radius: 5px; }
        .support-links a { display: inline-block; margin-right: 15px; color: #007bff; text-decoration: none; }
        #site-selection-form label { display: block; margin: 8px 0; }
        #save-confirmation { margin-top: 15px; padding: 10px; border-radius: 4px; text-align: center; color: #155724; background-color: #d4edda; border: 1px solid #c3e6cb; display: none; opacity: 0; transition: opacity 0.5s ease-in-out; }
    </style>
</head>
<body>
    <h1>Amazon Multi-Search Helper 設定 / Settings</h1>
    
    <div class="section">
        <h2>サイト選択 / Site Selection</h2>
        <form id="site-selection-form">
            <label><input type="checkbox" name="site" value="kindle"> Kindle</label>
            <label><input type="checkbox" name="site" value="kinokuniya"> 紀伊國屋</label>
            <label><input type="checkbox" name="site" value="honto"> honto</label>
            <label><input type="checkbox" name="site" value="tsutaya"> TSUTAYA</label>
            <label><input type="checkbox" name="site" value="yodobashi"> ヨドバシ</label>
            <label><input type="checkbox" name="site" value="bookoff"> ブックオフ</label>
            <label><input type="checkbox" name="site" value="valuebooks"> バリューブックス</label>
            <label><input type="checkbox" name="site" value="library"> 図書館</label>
            <label><input type="checkbox" name="site" value="nearbyBookstores"> 近くの書店</label>
            <label><input type="checkbox" name="site" value="nearbyBookoff"> 近くのブックオフ</label>
            <label><input type="checkbox" name="site" value="rakutenBooks"> 楽天ブックス</label>
            <label><input type="checkbox" name="site" value="rakutenBookoff"> 楽天ブックオフ</label>
            <label><input type="checkbox" name="site" value="rakutenValuebooks"> 楽天バリューブックス</label>
            <label><input type="checkbox" name="site" value="mercari"> メルカリ</label>
            <label><input type="checkbox" name="site" value="rakutenAll"> 楽天市場全体</label>
            <label><input type="checkbox" name="site" value="bookmeter"> 読書メーター</label>
            <button type="button" id="save-settings">保存 / Save</button>
            <div id="save-confirmation"></div>
        </form>
    </div>

    <div class="version">Version 1.0.0</div>
</body>
</html>
